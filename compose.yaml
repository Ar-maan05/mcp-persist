# Local Redis + Postgres for running the examples and the integration tests.
#
#   docker compose up -d        # or: podman compose up -d
#
# Then run the examples (see examples/README.md), or the full test suite against
# real backends instead of fakeredis / skipped Postgres:
#
#   MCP_TEST_REDIS_URL=redis://localhost:6379/0 \
#   MCP_TEST_POSTGRES_URL=postgresql://postgres@localhost:5432/postgres \
#     uv run pytest tests/ -v
#
# Tear down with `docker compose down` (add `-v` to drop the Postgres volume).
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
